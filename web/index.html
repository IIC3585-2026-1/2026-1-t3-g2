<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knapsack Problem — WebAssembly</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <p class="header-tag">WebAssembly · C++ · Emscripten</p>
        <h1>Problema de la Mochila</h1>
      </header>
      <main>

        <!-- ── Input panel ────────────────────────── -->
        <section class="panel">
          <h2>Datos de Entrada</h2>

          <div class="form-group">
            <label for="maxWeight">Peso máximo de la mochila</label>
            <input type="number" id="maxWeight" min="1" max="100" value="15" />
          </div>

          <div class="form-group">
            <label for="algorithm">Algoritmo</label>
            <select id="algorithm">
              <option value="recursive">Recursión (Fuerza Bruta)</option>
              <option value="memo">Memoización (Top-Down)</option>
              <option value="dp" selected>Tabulación Bottom-Up</option>
              <option value="optimized">Optimizado (Menos Memoria)</option>
            </select>
          </div>

          <div class="form-group">
            <label>Items (Peso · Valor)</label>
            <div class="item-headers">
              <span>Peso</span>
              <span>Valor</span>
            </div>
            <div id="itemsList" class="items-list"></div>
            <button id="addItemBtn" class="btn btn-secondary">+ Agregar item</button>
          </div>

          <div class="button-group">
            <button id="solveBtn" class="btn btn-primary">▶ Resolver</button>
            <button id="exampleBtn" class="btn btn-secondary">Ejemplo</button>
            <button id="clearBtn" class="btn btn-secondary">Limpiar</button>
          </div>
        </section>

        <!-- ── Result panel ────────────────────────── -->
        <section class="panel">
          <h2>Resultado</h2>
          <div id="result" class="result-area">
            <p class="placeholder">Los resultados aparecerán aquí...</p>
          </div>
        </section>

        <!-- ── Algorithm info panel (full width) ───── -->
        <section class="panel" id="algo-info-panel">
          
          <div id="algoInfo">
            <!-- filled dynamically by app.js -->
          </div>
        </section>

      </main>

      <footer>
        <p><span>Grupo 2</span></p>
      </footer>
    </div>

    <!-- WASM glue code generado por Emscripten -->
    <script src="wasm/knapsack.js"></script>
    <script src="app.js"></script>
  </body>
</html>
